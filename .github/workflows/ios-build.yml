name: iOS Build & Test

on:
  push:
    branches: [ "main", "master", "feature/eye-tracking-reading-progress" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Example App (iOS Simulator)
    runs-on: macos-15          # Xcode 16 · iOS 18 SDK

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Show SDK info
        run: xcodebuild -showsdks

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Example/Example.xcodeproj \
            -scheme Example

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -project Example/Example.xcodeproj \
            -scheme Example \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty || cat

      - name: Build succeeded
        run: echo "✅ Build passed"

  tafseer-unit-tests:
    name: Tafseer Unit Tests (macOS)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Run unit tests via xcodebuild
        run: |
          xcodebuild test \
            -project Example/Example.xcodeproj \
            -scheme Example \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing:MushafImadTests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty || cat
